# Gitleaks configuration — Anthra Security Platform
# NIST Control: IA-5(7) — No Embedded Secrets
# FedRAMP Moderate — Authenticator Management
# Generated by GuidePoint Security / JSA-DevSec

title = "Anthra FedRAMP Gitleaks Configuration"

[extend]
# Extend default gitleaks ruleset with Anthra-specific patterns
useDefault = true

# ===========================================================================
# ANTHRA-SPECIFIC RULES
# ===========================================================================

[[rules]]
id = "anthra-api-key"
description = "Anthra internal API key hardcoded in source"
regex = '''(?i)(anthra[_\-]?api[_\-]?key|anthra[_\-]?secret)\s*[=:]\s*['"]?([a-zA-Z0-9_\-]{20,})'''
tags = ["anthra", "api-key", "IA-5(7)"]
severity = "CRITICAL"

  [rules.allowlist]
  regexes = [
    # Allow env var references — these are safe
    '''os\.environ''',
    '''\$\{[A-Z_]+\}''',
    '''\$\([A-Z_]+\)''',
    # Allow K8s secretKeyRef
    '''secretKeyRef''',
    '''valueFrom''',
  ]

[[rules]]
id = "anthra-db-password"
description = "Anthra database credentials hardcoded in source"
regex = '''(?i)(anthra[_\-]?db[_\-]?pass(?:word)?|db[_\-]?pass(?:word)?)\s*[=:]\s*['"]([^'"]{8,})'''
tags = ["anthra", "database", "IA-5(7)", "SC-28"]
severity = "CRITICAL"

  [rules.allowlist]
  regexes = [
    '''os\.environ''',
    '''\$\{[A-Z_]+\}''',
    '''secretKeyRef''',
    # Allow env var format in compose files (no actual value)
    '''=\s*$''',
  ]

[[rules]]
id = "anthra-yaml-secret"
description = "Hardcoded secret value in YAML manifest (not using secretKeyRef)"
regex = '''(?i)(?:password|secret|api[_\-]?key|private[_\-]?key|access[_\-]?token)\s*:\s*['"]?(?!\s*$)(?!\$\{)(?!secretKeyRef)(?!valueFrom)([a-zA-Z0-9_\-!@#$%^&*]{8,})'''
path = '''\.ya?ml$'''
tags = ["yaml", "kubernetes", "IA-5(7)"]
severity = "HIGH"

  [rules.allowlist]
  regexes = [
    # Safe patterns — K8s references and env var interpolation
    '''secretKeyRef''',
    '''valueFrom''',
    '''\$\{''',
    '''\$\(''',
    # bcrypt hash patterns — these are hashes, not plaintext
    '''\$2[aby]\$''',
    # Placeholder markers
    '''(?i)placeholder''',
    '''(?i)change.?me''',
    '''(?i)your.?secret''',
  ]

# ===========================================================================
# GLOBAL ALLOWLIST
# Paths and patterns that are known-intentional in this demo environment
# ===========================================================================

[allowlist]
description = "Known-intentional demo/test values and scan artifact paths"

regexes = [
  # Demo seed: documented insecure, tracked in POA&M, rotate before prod
  '''anthra_default_pass_123''',
  # Base64 of demo creds in secret.yaml — intentional teaching artifact
  '''YW50aHJhX2RlZmF1bHRfcGFzc18xMjM=''',
  # MD5 in init.sql test seed data — tracked as IA-5(1) finding
  '''md5\((?:'|")admin123(?:'|")\)''',
]

paths = [
  # Scan artifacts — findings reference vuln patterns by design
  '''GP-Copilot/jsa-devsec/findings/''',
  '''GP-Copilot/jsa-devsec/reports/''',
  '''GP-Copilot/jsa-devsec/scanner-outputs/''',
  # FedRAMP package docs reference control evidence
  '''GP-Copilot/fedRAMP-package/''',
  # Gitleaks config itself may contain example patterns
  '''GP-Copilot/jsa-devsec/gitleaks.toml''',
]

stopwords = [
  "placeholder",
  "example",
  "PLACEHOLDER",
  "CHANGE_ME",
  "YOUR_SECRET_HERE",
  "demo",
  "sample",
  "test_value",
]
